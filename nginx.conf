worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Redirection HTTP vers HTTPS
    server {
        listen 80;
        server_name ano-nym.fr;
        return 301 https://$host$request_uri;  # Redirection vers HTTPS
    }

    # Configuration du serveur HTTPS
    server {
        listen 443 ssl;
        server_name ano-nym.fr;

        # Chemin vers les certificats SSL
        ssl_certificate /etc/nginx/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;

        location /socket.io/ {
            proxy_pass http://backend:5000;  # Assurez-vous que cela pointe vers votre backend
            proxy_http_version 1.1;           # Nécessaire pour les WebSockets
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";  # Important pour activer les WebSockets
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy pour les images par defaut
        location /uploads/profiles/default {
            proxy_pass http://backend:5000/uploads/profiles/default/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Proxy pour les fichiers d'avatars provenant du backend
        location /uploads/profiles/avatars/ {
            proxy_pass http://backend:5000/uploads/profiles/avatars/;  # Redirige vers votre backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Proxy pour les images d'articles
        location /uploads/articles/ {
            proxy_pass http://backend:5000/uploads/articles/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Configuration pour le frontend
        location / {
            proxy_pass http://frontend:8080;  # Conteneur Docker du frontend
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr; 
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Configuration pour le backend (via /api/)
        location /api/ {
            proxy_pass http://backend:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy pour la documentation de l'API
        location /api/admin/api-docs/ {
            proxy_pass http://backend:5000/api/admin/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}