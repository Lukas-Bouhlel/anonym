  <style>
    .anonym-map-loading {
      align-items: center;
      background: #393566;
      color: #FCFAFE;
      display: flex;
      font: 600 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100%;
      justify-content: center;
      text-align: center;
      width: 100%;
    }

    .anonym-map-marker {
      align-items: center;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    .anonym-map-avatars {
      position: relative;
    }

    .anonym-map-avatar {
      align-items: center;
      border: 3px solid #FCFAFE;
      border-radius: 999px;
      box-shadow: 0 5px 12px rgba(41, 41, 41, 0.36);
      color: #FCFAFE;
      display: flex;
      justify-content: center;
      overflow: hidden;
      position: absolute;
      top: 0;
    }

    .anonym-map-avatar img {
      height: 100%;
      object-fit: cover;
      width: 100%;
    }

    .anonym-map-initials {
      color: #FCFAFE;
      font: 800 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .anonym-map-badge {
      align-items: center;
      background: #393566;
      border: 2px solid #FCFAFE;
      border-radius: 999px;
      color: #FCFAFE;
      display: flex;
      font: 800 10px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 24px;
      justify-content: center;
      position: absolute;
      right: -8px;
      top: -6px;
      width: 24px;
    }

    .anonym-map-label {
      background: rgba(41, 41, 41, 0.66);
      border: 1px solid rgba(252, 250, 254, 0.28);
      border-radius: 999px;
      color: #FCFAFE;
      font: 700 12.5px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      margin-top: 2px;
      max-width: 170px;
      overflow: hidden;
      padding: 4px 9px;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>

  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #393566;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
