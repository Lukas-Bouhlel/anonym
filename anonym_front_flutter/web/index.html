<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="anonym_front_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>anonym_front_flutter</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css">
  <style>
    .moji-map-loading {
      align-items: center;
      background: #393566;
      color: #FCFAFE;
      display: flex;
      font: 600 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100%;
      justify-content: center;
      text-align: center;
      width: 100%;
    }

    .moji-map-marker {
      align-items: center;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    .moji-map-avatars {
      position: relative;
    }

    .moji-map-avatar {
      align-items: center;
      border: 3px solid #FCFAFE;
      border-radius: 999px;
      box-shadow: 0 5px 12px rgba(41, 41, 41, 0.36);
      color: #FCFAFE;
      display: flex;
      justify-content: center;
      overflow: hidden;
      position: absolute;
      top: 0;
    }

    .moji-map-avatar img {
      height: 100%;
      object-fit: cover;
      width: 100%;
    }

    .moji-map-initials {
      color: #FCFAFE;
      font: 800 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .moji-map-badge {
      align-items: center;
      background: #393566;
      border: 2px solid #FCFAFE;
      border-radius: 999px;
      color: #FCFAFE;
      display: flex;
      font: 800 10px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 24px;
      justify-content: center;
      position: absolute;
      right: -8px;
      top: -6px;
      width: 24px;
    }

    .moji-map-label {
      background: rgba(41, 41, 41, 0.66);
      border: 1px solid rgba(252, 250, 254, 0.28);
      border-radius: 999px;
      color: #FCFAFE;
      font: 700 12.5px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      margin-top: 2px;
      max-width: 170px;
      overflow: hidden;
      padding: 4px 9px;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
  <script src="mapbox_bridge.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
