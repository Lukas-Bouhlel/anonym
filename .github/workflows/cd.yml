name: cd_deploy_to_production

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  
jobs:
  prod-build-deploy:
    runs-on: ubuntu-latest

    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'preprod' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Create SSH directory
        run: mkdir -p ~/.ssh

      - name: Set up known_hosts
        run: ssh-keyscan -H -t rsa -p 53339 51.75.18.155 >> ~/.ssh/known_hosts

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.LUKAS_KEY_PRIVATE }}

      - name: Deploy to VPS
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes -p 53339 lukas@51.75.18.155 'bash -se' << 'EOF'
          set -euo pipefail
          cd /home/ubuntu/anonym
          git fetch origin main
          git checkout main
          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "Deployment stopped: the server repository has local changes."
            echo "Review/commit/stash/clean changes in /home/ubuntu/anonym before deploying."
            git status --short
            exit 1
          fi
          git pull --ff-only origin main
          cd anonym-front-end
          npm run build
          cd ..
          docker-compose -f docker-compose.prod.yml --env-file .env.production up -d --build
          EOF
