name: cd_deploy_to_production

on:
  workflow_run:
    workflows: ["ci_worflow"]
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  VPS_HOST: 51.75.18.155
  VPS_PORT: "53339"
  VPS_USER: lukas
  MOBILE_ARTIFACTS_DIR: /home/lukas/mobile-artifacts/anonym

jobs:
  prepare-production-deploy:
    name: Prepare production deployment
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: CI gate
        run: |
          echo "Production deployment authorized."
          echo "Trigger: ${{ github.event_name }}"

  build-mobile-apk:
    name: Build signed mobile APK
    runs-on: ubuntu-latest
    needs: prepare-production-deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure Android release signing
        working-directory: ./anonym_front_flutter
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build Android release APK
        working-directory: ./anonym_front_flutter
        env:
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          MOBILE_API_BASE_URL: ${{ secrets.MOBILE_API_BASE_URL }}
        run: |
          set -euo pipefail
          API_BASE_URL="${MOBILE_API_BASE_URL:-https://www.ano-nym.fr}"
          flutter pub get
          flutter build apk --release \
            --dart-define=APP_ENV=prod \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=MAPBOX_ACCESS_TOKEN="$MAPBOX_ACCESS_TOKEN"
          mkdir -p ../mobile-release
          SHORT_SHA="$(git rev-parse --short HEAD)"
          RELEASE_DATE="$(date -u +%Y%m%d%H%M%S)"
          cp build/app/outputs/flutter-apk/app-release.apk "../mobile-release/anonym-${RELEASE_DATE}-${SHORT_SHA}.apk"

      - name: Store APK for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: production-mobile-apk
          path: mobile-release/*.apk
          if-no-files-found: error
          retention-days: 1

  deploy-vps:
    name: Deploy web and backend to VPS
    runs-on: ubuntu-latest
    needs: build-mobile-apk

    steps:
      - name: Create SSH directory
        run: mkdir -p ~/.ssh

      - name: Set up known_hosts
        run: ssh-keyscan -H -t rsa -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.LUKAS_KEY_PRIVATE }}

      - name: Deploy to VPS
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" 'bash -se' << 'EOF'
          set -euo pipefail
          cd /home/ubuntu/anonym

          git fetch origin main
          git checkout main

          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "Deployment stopped: the server repository has local changes."
            echo "Review/commit/stash/clean changes in /home/ubuntu/anonym before deploying."
            git status --short
            exit 1
          fi

          local_sha="$(git rev-parse main)"
          remote_sha="$(git rev-parse origin/main)"
          merge_base="$(git merge-base main origin/main)"

          if [ "$local_sha" = "$remote_sha" ]; then
            echo "Server repository already matches origin/main."
          elif [ "$local_sha" = "$merge_base" ]; then
            git merge --ff-only origin/main
          else
            backup_branch="server-main-backup-$(date -u +%Y%m%d%H%M%S)"
            git branch "$backup_branch" "$local_sha"
            echo "Server main diverged. Saved local main as $backup_branch."
            git reset --hard origin/main
          fi

          cd anonym-front-end
          npm run build
          cd ..
          docker-compose -f docker-compose.prod.yml --env-file .env.production up -d --build --remove-orphans
          EOF

  publish-mobile-apk:
    name: Publish APK to VPS
    runs-on: ubuntu-latest
    needs: deploy-vps

    steps:
      - name: Create SSH directory
        run: mkdir -p ~/.ssh

      - name: Set up known_hosts
        run: ssh-keyscan -H -t rsa -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.LUKAS_KEY_PRIVATE }}

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: production-mobile-apk
          path: mobile-release

      - name: Upload Android APK to VPS
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$MOBILE_ARTIFACTS_DIR'"
          scp -o StrictHostKeyChecking=yes -P "$VPS_PORT" mobile-release/*.apk "$VPS_USER@$VPS_HOST:$MOBILE_ARTIFACTS_DIR/"
          ssh -o StrictHostKeyChecking=yes -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "cd '$MOBILE_ARTIFACTS_DIR' && ls -1t anonym-*.apk | tail -n +11 | xargs -r rm -f && ls -lh"
