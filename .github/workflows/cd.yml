name: cd_deploy_to_production

on:
  workflow_run:
    workflows: ["ci_workflow"] 
    branches:
      - main 
    types:
      - completed 

jobs:
  prod-build-deploy:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'preprod' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create SSH directory
        run: mkdir -p ~/.ssh

      - name: Set up known_hosts
        run: ssh-keyscan -t rsa -p 53339 51.75.18.155 >> ~/.ssh/known_hosts

      - name: Debug Known Hosts
        run : cat ~/.ssh/known_hosts

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.LUKAS_KEY_PRIVATE }}

      - name: Deploy to VPS
        run: |
          ssh -p 53339 lukas@51.75.18.155 << 'EOF'
          cd /home/ubuntu/anonym
          git checkout main
          git pull
          cd anonym-front-end
          sudo npm run build
          cd ..
          docker-compose -f docker-compose.prod.yml --env-file .env.production up -d --build
          EOF