name: CD Workflow

on:
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
        # Checkout the repository
        - name: Checkout repository
          uses: actions/checkout@v3

        # Déployer sur le serveur de production
        - name: Deploy to Production
          run: |
            ssh-agent bash -c 'ssh-add <(echo "${{ secrets.PROD_SSH_KEY }}"); ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} << EOF
                git pull origin main
                npm run build-preprod
                https://preprod.ano-nym.fr:8443/
                docker-compose -f docker-compose.preprod.yml --env-file .env.preprod up -d --build
                npm run build
                docker-compose -f docker-compose.prod.yml --env-file .env.production up -d --build
            EOF'