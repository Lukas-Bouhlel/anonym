name: CI Workflow

on: 
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # ---- Frontend Snyk Security Check ----
      - name: Run Snyk on Frontend for vulnerabilities
        working-directory: ./anonym-front-end
        run: npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # ---- Backend Snyk Security Check ----
      - name: Run Snyk on Backend for vulnerabilities
        working-directory: ./anonym-back-end
        run: npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Set up Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.16.0'

    # ---- Frontend: Lint, Test, and Build ----
    - name: Install dependencies for Frontend
      working-directory: ./anonym-front-end   # Path to your front-end folder
      run: npm install

    - name: Run Frontend Lint
      working-directory: ./anonym-front-end   # Lint JavaScript files
      run: npm run lint

    - name: Run Frontend SCSS Lint
      working-directory: ./anonym-front-end   # Lint SCSS files
      run: npm run lint:scss

    - name: Run Frontend Tests
      working-directory: ./anonym-front-end
      run: npm run test -- --ci

    - name: Build Frontend
      working-directory: ./anonym-front-end
      run: npm run build

    # ---- Backend: Lint, Test, and Snyk Security Check ----
    - name: Install dependencies for Backend
      working-directory: ./anonym-back-end    # Path to your back-end folder
      run: npm install

    - name: Run Backend Lint
      working-directory: ./anonym-back-end    # Lint JavaScript files in the back-end
      run: npm run lint

    # Start a MySQL service (Docker)
    - name: Set up MySQL for testing
      uses: docker/setup-buildx-action@v2
    - name: Start MySQL
      run: |
        docker run --name mysql -e MYSQL_ROOT_PASSWORD=root -e MYSQL_DATABASE=test_anonym -p 3306:3306 -d mysql:5.7
        sleep 15 # Wait for MySQL to initialize

    # Copy the .env file (or define variables directly)
    - name: Copy .env file
      run: cp ./anonym-back-end/.env ./anonym-back-end/.env.example

    # Run Backend Tests
    - name: Run Backend Tests
      working-directory: ./anonym-back-end
      env:
        DB_TEST_USERNAME: root
        DB_TEST_PASSWORD: ""
        DB_TEST_DATABASE: test_anonym
        DB_TEST_HOST: 127.0.0.1
        DB_TEST_DIALECT: mysql
        NODE_ENV: test
      run: npm run test