name: ci_worflow

on: 
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - preprod 

jobs:
  prepare-ci:
    name: Prepare CI
    runs-on: ubuntu-latest

    steps:
      - name: Start CI pipeline
        run: |
          echo "CI pipeline started."
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA}"

  security:
    name: Security checks
    runs-on: ubuntu-latest
    needs: prepare-ci
 
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # ---- Frontend Snyk Security Check ----
      - name: Run Snyk on Frontend for vulnerabilities
        working-directory: ./anonym-front-end
        run: npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # ---- Backend Snyk Security Check ----
      - name: Run Snyk on Backend for vulnerabilities
        working-directory: ./anonym-back-end
        run: npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run npm audit on Frontend
        working-directory: ./anonym-front-end
        run: npm audit --audit-level=high

      - name: Run npm audit on Backend
        working-directory: ./anonym-back-end
        run: npm audit --audit-level=high

      - name: Run Snyk on Flutter for vulnerabilities
        working-directory: ./anonym_front_flutter
        run: |
          npx @cyclonedx/cdxgen -t dart --spec-version 1.6 -o sbom.cdx.json
          npx snyk sbom test --file=sbom.cdx.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  flutter:
    name: Flutter mobile validation
    runs-on: ubuntu-latest
    needs: security

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Flutter pub get
      working-directory: ./anonym_front_flutter
      run: flutter pub get

    - name: Flutter analyze
      working-directory: ./anonym_front_flutter
      run: flutter analyze

    - name: Flutter tests
      working-directory: ./anonym_front_flutter
      run: flutter test

    - name: Configure Android release signing
      working-directory: ./anonym_front_flutter
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
        cat > android/key.properties <<EOF
        storeFile=upload-keystore.jks
        storePassword=$ANDROID_KEYSTORE_PASSWORD
        keyAlias=$ANDROID_KEY_ALIAS
        keyPassword=$ANDROID_KEY_PASSWORD
        EOF

    - name: Build Android release APK for mobile validation
      working-directory: ./anonym_front_flutter
      run: >
        flutter build apk --release
        --dart-define=APP_ENV=prod
        --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}

    - name: Upload Android release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: anonym-flutter-release-apk
        path: anonym_front_flutter/build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: error

  build:
    name: Web and backend validation
    runs-on: ubuntu-latest
    needs: security

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_TEST_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_TEST_DATABASE }}
        ports:
          - '3306:3306'
        options: --health-cmd="mysqladmin ping -h localhost --password=password" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
    # Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Set up Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.12.0'
    
    # ---- Frontend: Lint, Test, and Build ----
    - name: Install dependencies for Frontend
      working-directory: ./anonym-front-end   # Path to your front-end folder
      run: |
        npm ci --legacy-peer-deps --foreground-scripts || (
          rm -rf node_modules
          npm cache clean --force
          npm ci --legacy-peer-deps --foreground-scripts
        )

    - name: Generate Documentation
      working-directory: ./anonym-front-end
      run: npm run generate-doc

    - name: Run Frontend Lint
      working-directory: ./anonym-front-end   # Lint JavaScript files
      run: npm run lint

    - name: Run Frontend SCSS Lint
      working-directory: ./anonym-front-end   # Lint SCSS files
      run: npm run lint:scss

    - name: Run Frontend Tests
      working-directory: ./anonym-front-end
      run: npm run test -- --ci

    - name: Build Frontend
      working-directory: ./anonym-front-end
      run: npm run build

    # ---- Backend: Lint, Test, Database Setup, and Test Execution ----
    - name: Install dependencies for Backend
      working-directory: ./anonym-back-end
      run: npm ci --legacy-peer-deps

    - name: Generate Documentation
      working-directory: ./anonym-back-end
      run: npm run generate-doc

    - name: Run Backend Lint 
      working-directory: ./anonym-back-end
      run: npm run lint

    - name: Create Test Database
      working-directory: ./anonym-back-end
      run: npx sequelize-cli db:create --env test --config ./app/config/config.js
      env:
        NODE_ENV: ${{ secrets.NODE_ENV }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        DB_TEST_USERNAME: ${{ secrets.DB_TEST_USERNAME }}
        DB_TEST_PASSWORD: ${{ secrets.DB_TEST_PASSWORD }}
        DB_TEST_DATABASE: ${{ secrets.DB_TEST_DATABASE }}
        DB_TEST_HOST: ${{ secrets.DB_TEST_HOST }}
        DB_TEST_DIALECT: ${{ secrets.DB_TEST_DIALECT }}
        MAIL_USER: ${{ secrets.MAIL_USER }}
        MAIL_PASS: ${{ secrets.MAIL_PASS }}
        BACK_END_ORIGIN: ${{ secrets.BACK_END_ORIGIN }}
        ORIGIN: ${{ secrets.ORIGIN }}

    - name: Run Migrations on Test Database
      working-directory: ./anonym-back-end 
      run: npx sequelize-cli db:migrate --env test --config ./app/config/config.js --migrations-path ./app/migrations
      env:
        NODE_ENV: ${{ secrets.NODE_ENV }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        DB_TEST_USERNAME: ${{ secrets.DB_TEST_USERNAME }}
        DB_TEST_PASSWORD: ${{ secrets.DB_TEST_PASSWORD }}
        DB_TEST_DATABASE: ${{ secrets.DB_TEST_DATABASE }}
        DB_TEST_HOST: ${{ secrets.DB_TEST_HOST }}
        DB_TEST_DIALECT: ${{ secrets.DB_TEST_DIALECT }}
        MAIL_USER: ${{ secrets.MAIL_USER }}
        MAIL_PASS: ${{ secrets.MAIL_PASS }}
        BACK_END_ORIGIN: ${{ secrets.BACK_END_ORIGIN }}
        ORIGIN: ${{ secrets.ORIGIN }}

    - name: Run Backend Tests
      working-directory: ./anonym-back-end
      run: npm run test
      env:
        NODE_ENV: ${{ secrets.NODE_ENV }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        DB_TEST_USERNAME: ${{ secrets.DB_TEST_USERNAME }}
        DB_TEST_PASSWORD: ${{ secrets.DB_TEST_PASSWORD }}
        DB_TEST_DATABASE: ${{ secrets.DB_TEST_DATABASE }}
        DB_TEST_HOST: ${{ secrets.DB_TEST_HOST }}
        DB_TEST_DIALECT: ${{ secrets.DB_TEST_DIALECT }}
        MAIL_USER: ${{ secrets.MAIL_USER }}
        MAIL_PASS: ${{ secrets.MAIL_PASS }}
        BACK_END_ORIGIN: ${{ secrets.BACK_END_ORIGIN }}
        ORIGIN: ${{ secrets.ORIGIN }}

  backend-performance:
    name: Backend performance validation
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.12.0'

    - name: Install backend dependencies
      working-directory: ./anonym-back-end
      run: npm ci --legacy-peer-deps

    - name: Start backend for performance test
      working-directory: ./anonym-back-end
      run: |
        nohup npm run start:ci > backend-perf.log 2>&1 &
        for i in {1..30}; do
          if curl -fsS http://127.0.0.1:5000/health; then
            exit 0
          fi
          sleep 2
        done
        cat backend-perf.log
        exit 1
      env:
        NODE_ENV: test
        PORT: 5000
        JWT_SECRET: ci_jwt_secret
        STRIPE_SECRET_KEY: sk_test_ci
        DB_TEST_USERNAME: root
        DB_TEST_PASSWORD: password
        DB_TEST_DATABASE: anonym_test
        DB_TEST_HOST: 127.0.0.1
        DB_TEST_DIALECT: mysql
        ORIGIN: http://localhost:3000

    - name: Run backend API performance test
      working-directory: ./anonym-back-end
      run: npm run perf:backend

    - name: Upload backend performance logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-performance-logs
        path: |
          anonym-back-end/backend-perf.log
        if-no-files-found: ignore

  ci-passed:
    name: CI passed
    runs-on: ubuntu-latest
    needs:
      - flutter
      - build
      - backend-performance

    steps:
      - name: Confirm CI success
        run: echo "All CI checks passed."
