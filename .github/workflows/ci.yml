    # ---- Backend: Lint, Test, Database Setup, and Test Execution ----
    - name: Install dependencies for Backend
      working-directory: ./anonym-back-end
      run: npm install

    # Start MySQL container
    - name: Set up MySQL for testing
      uses: docker/setup-buildx-action@v2

    - name: Start MySQL container
      run: |
        docker run --name mysql -e MYSQL_ROOT_PASSWORD= -e MYSQL_DATABASE=test_anonym -p 3306:3306 -d mysql:5.7
        # Wait for MySQL to be ready
        sleep 15

    # ---- Appliquer les migrations Sequelize ----
    - name: Run Sequelize Migrations
      working-directory: ./anonym-back-end
      run: npx sequelize-cli db:migrate --config ./app/config/config.js
      env:
        NODE_ENV: test
        DB_TEST_USERNAME: root
        DB_TEST_PASSWORD: ""
        DB_TEST_DATABASE: test_anonym
        DB_TEST_HOST: 127.0.0.1
        DB_TEST_DIALECT: mysql

    # Run Backend Tests
    - name: Run Backend Tests
      working-directory: ./anonym-back-end
      env:
        DB_TEST_USERNAME: root
