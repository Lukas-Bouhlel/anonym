name: cd_preprod_workflow

on: 
  workflow_run:
    workflows: ["ci_worflow"]
    branches:
      - preprod
    types:
      - completed
 
jobs:
  preprod-build-deploy:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create SSH directory
        run: mkdir -p ~/.ssh

      - name: Set up known_hosts
        run: ssh-keyscan -t rsa -p 53339 51.75.18.155 >> ~/.ssh/known_hosts

      - name: Debug Known Hosts
        run : cat ~/.ssh/known_hosts

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.LUKAS_KEY_PRIVATE }}

      - name: Deploy to VPS
        run: |
          ssh -p 53339 lukas@51.75.18.155 << 'EOF'
          cd /home/ubuntu/anonym
          df -h
          docker system df || true
          docker container prune -f || true
          docker image prune -af || true
          docker builder prune -af || true
          docker system df || true
          df -h
          git checkout preprod
          git pull --rebase
          docker-compose -f docker-compose.preprod.yml --env-file .env.preprod up -d --build --remove-orphans
          EOF
